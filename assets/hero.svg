<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300" width="100%" height="100%">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400..800&amp;family=Fragment+Mono&amp;family=Plus+Jakarta+Sans:wght@400;500&amp;display=swap');
      
      .bg { fill: #F3F1FF; }
      .text-small {
        font-family: 'Fragment Mono', monospace;
        font-size: 14px;
        fill: #FF3E88;
        letter-spacing: 2px;
        text-transform: uppercase;
        font-weight: 600;
      }
      .text-large {
        font-family: 'Bricolage Grotesque', sans-serif;
        font-size: 54px;
        font-weight: 700;
        fill: #1B1830;
      }
      .highlight {
        fill: #FF3E88;
      }
      .text-desc {
        font-family: 'Plus Jakarta Sans', sans-serif;
        font-size: 16px;
        fill: #6E6A85;
      }
      
      .draw-line {
        stroke-dasharray: 200;
        stroke-dashoffset: 200;
        animation: draw 1.5s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
        animation-delay: 0.6s;
      }
      @keyframes draw {
        to { stroke-dashoffset: 0; }
      }
      
      .float-1 { animation: float 3.5s ease-in-out infinite; transform-origin: center; }
      .float-2 { animation: float 4.2s ease-in-out infinite 1s; transform-origin: center; }
      .float-3 { animation: float 3.8s ease-in-out infinite 0.5s; transform-origin: center; }
      
      @keyframes float {
        0%, 100% { transform: translateY(0px); }
        50% { transform: translateY(-12px); }
      }
      
      .fade-in-up {
        opacity: 0;
        animation: fadeInUp 0.8s ease-out forwards;
      }
      .delay-1 { animation-delay: 0.1s; }
      .delay-2 { animation-delay: 0.3s; }
      .delay-3 { animation-delay: 0.5s; }
      
      @keyframes fadeInUp {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
      }
    </style>
  </defs>
  
  <rect width="800" height="300" class="bg" rx="20" />
  
  <!-- Text Content with Staggered Fade-in -->
  <g class="fade-in-up delay-1">
    <rect x="330" y="70" width="140" height="28" rx="14" fill="#FFE3EE" stroke="#FF3E88" stroke-width="1.5" />
    <text x="400" y="89" text-anchor="middle" class="text-small" font-size="11px">NLP &amp; TEXT AI</text>
  </g>
  
  <g class="fade-in-up delay-2">
    <text x="400" y="155" text-anchor="middle" class="text-large">
      Meaning, mapped as <tspan class="highlight">vectors</tspan>
    </text>
    <!-- Yellow underline -->
    <path d="M 590 165 Q 650 152, 750 165" fill="none" stroke="#FFD93D" stroke-width="8" stroke-linecap="round" class="draw-line" />
  </g>
  
  <g class="fade-in-up delay-3">
    <text x="400" y="205" text-anchor="middle" class="text-desc">
      A sleek playground to visualize semantic sentence similarity.
    </text>
    <text x="400" y="230" text-anchor="middle" class="text-desc">
      Powered by <tspan font-weight="600" fill="#1B1830">Sentence-Transformers</tspan> &amp; <tspan font-family="Fragment Mono" font-size="14px">PCA</tspan>.
    </text>
  </g>
</svg>
